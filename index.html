      function getCookie(name) {
        var m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));

      function setCookie(name, val, days) {
        var d = '';

          d = ';domain=.' + window.location.hostname.split('.').slice(-2).join('.');
        } catch (e) { }
        document.cookie = name + '=' + val + ';path=/;max-age=' + (days * 86400) + ';SameSite=Lax' + d;

      function getParam(name) {
        var m = window.location.search.match(new RegExp('[?&]' + name + '=([^&]+)'));
        if (m) return decodeURIComponent(m[1]);
        var h = window.location.hash.match(new RegExp('[#&]' + name + '=([^&]+)'));

      function extractFbclid(url) {

        var fbp = 'fb.' + domainParts + '.' + ts + '.' + rand;

      function getFbc() {
        var existingFbc = getCookie('_fbc');
        var fbclid = null;
        fbclid = getParam('fbclid');
        if (!fbclid) {
          try {
            var entries = performance.getEntriesByType('navigation');

        if (!fbclid) { try { fbclid = sessionStorage.getItem('_tp_fbclid'); } catch (e) { } }
        if (fbclid) {

            try { localStorage.setItem('_tp_fbclid', fbclid); } catch (e) { }
            try { sessionStorage.setItem('_tp_fbclid', fbclid); } catch (e) { }
            var domainParts = 1;
            try { domainParts = window.location.hostname.split('.').length - 1; } catch (e) { }
            var fbc = 'fb.' + domainParts + '.' + Date.now() + '.' + fbclid;

        }
        if (existingFbc) return existingFbc;

      var _resolvedFbclid = getParam('fbclid');
      if (!_resolvedFbclid) { try { _resolvedFbclid = localStorage.getItem('_tp_fbclid'); } catch (e) { } }

      function tagLink(a) {
        if (!a || !a.href || !_resolvedFbclid) return;
        try {
          var u = new URL(a.href);
          if (u.hostname === window.location.hostname && !u.searchParams.has('fbclid')) {
            u.searchParams.set('fbclid', _resolvedFbclid);
            a.href = u.toString();

      }

      if (_resolvedFbclid) {
        document.addEventListener('click', function (e) {
          tagLink(e.target.closest ? e.target.closest('a') : null);
        }, true);
        try {
          new MutationObserver(function (muts) {
            muts.forEach(function (m) {
              m.addedNodes.forEach(function (n) {
                if (n.tagName === 'A') tagLink(n);
                if (n.querySelectorAll) n.querySelectorAll('a').forEach(tagLink);
              });
            });
          }).observe(document.documentElement, { childList: true, subtree: true });
        } catch (e) { }
        ['pushState', 'replaceState'].forEach(function (fn) {
          var orig = history[fn];

            var url = arguments[2];

              } catch (e) { }

            return orig.apply(this, arguments);

      }

      function getExternalId() {
        var key = '_tp_eid';
        var stored = null;
        try { stored = localStorage.getItem(key); } catch (e) { }
        if (!stored) { stored = getCookie(key); }
        if (stored) return stored;
        var eid = 'tp_' + genId();
        try { localStorage.setItem(key, eid); } catch (e) { }
        document.cookie = key + '=' + eid + ';path=/;max-age=31536000;SameSite=Lax';
        return eid;
      }

      function genId() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
          var r = Math.random() * 16 | 0;
          return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
      }

      var persistentEid = getExternalId();

      function getFbLoginId() {
        try { var stored = localStorage.getItem('_tp_fb_login_id'); if (stored) return stored; } catch (e) { }
        try { var stored2 = getCookie('_tp_fb_login_id'); if (stored2) return stored2; } catch (e) { }
        try {
          if (typeof FB !== 'undefined') {
            var uid = null;
            if (FB.getUserID) uid = FB.getUserID();
            if (!uid && FB.getAuthResponse) {
              var auth = FB.getAuthResponse();
              if (auth && auth.userID) uid = auth.userID;
            }
            if (uid) { persistFbLoginId(uid); return uid; }
          }
        } catch (e) { }
        return null;
      }

      function persistFbLoginId(uid) {
        try { localStorage.setItem('_tp_fb_login_id', uid); } catch (e) { }
        setCookie('_tp_fb_login_id', uid, 365);

      var _origFbAsyncInit = window.fbAsyncInit;

      // Auto-recover cached email for better Meta matching
      function getCachedEmail() {
        // From TrackPro identity cache (highest priority — explicitly set by user)
        try {
          var cached = localStorage.getItem('_tp_cached_email');
          if (cached) return cached;

        try {

      // Normalize email: lowercase, trim, strip invisible chars
      function normalizeEmail(e) {
        if (!e) return null;
        return e.toLowerCase().trim().replace(/[\r\n\t\s]+/g, '');
      }

      // Normalize phone for BR: digits only, ensure +55 prefix
      function normalizePhone(p) {
        if (!p) return null;
        var digits = p.replace(/\D/g, '');
        if (!digits) return null;
        // Add BR country code if missing (10-11 digit local numbers)
        if (digits.length === 10 || digits.length === 11) digits = '55' + digits;
        return digits;
      }

      // Detect if current page is Moda niche (URL or persisted source)
      function isModaPage() {
        var p = window.location.pathname.toLowerCase();
        var h = window.location.hash.toLowerCase();
        if (p.indexOf('/moda') >= 0 || h.indexOf('moda') >= 0) return true;
        // Persist across checkout/success: check stored source_page
        try { var sp = localStorage.getItem('source_page'); if (sp && sp.toLowerCase().indexOf('moda') >= 0) return true; } catch(e){}
        return false;
      }

      // Single fbq('init') — called ONCE on boot with best available data
      var _fbqInitDone = false;
      var _lastMatchEmail = null;
      function ensureFbqInit(email, phone) {
        if (_fbqInitDone) return;
        _fbqInitDone = true;
        if (typeof fbq === 'function') {
          var normEmail = normalizeEmail(email);
          var normPhone = normalizePhone(phone);

      // Re-init Pixel with new user data when it becomes available

        if (typeof fbq === 'function') {
          var advancedMatch = {
            external_id: persistentEid,
            country: 'br'

          advancedMatch.em = normEmail;

      window.trackPro = function (eventName, params) {
        params = params || {};
        var eventId = params.event_id || genId();

        var payload = {
          event_name: eventName,

      var _vcFired = false;
      function checkScroll() {
        if (_vcFired) return;

        var docHeight = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) - window.innerHeight;
        if (docHeight > 0 && (scrollTop / docHeight) >= 0.25) {

              custom_data: {

                whatsapp_number: waPhone || null,
                whatsapp_url: a.href

            });
            return;

          if (!_icFired) {
            var href = a.href.toLowerCase();
            var isCheckout = checkoutDomains.some(function (d) { return href.includes(d); });
            if (isCheckout) {
              _icFired = true;
              trackPro('InitiateCheckout', {
                custom_data: {

      left: 0;

    @keyframes slide-up {
      from {
        transform: translateY(10px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 20px 50px rgba(245, 158, 11, 0.4);
        transform: scale(1);
      }

      50% {
        box-shadow: 0 25px 70px rgba(245, 158, 11, 0.8);
        transform: scale(1.02);
      }
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(1);
        opacity: 1;
        box-shadow: 0 0 0 0px rgba(245, 158, 11, 0.7);
      }

      70% {
        transform: scale(1.1);
        opacity: 0.5;
        box-shadow: 0 0 0 15px rgba(245, 158, 11, 0);
      }

      100% {
        transform: scale(1);
        opacity: 1;
        box-shadow: 0 0 0 0px rgba(245, 158, 11, 0);
      }
    }

    @keyframes container-flash {

      0%,
      100% {
        border-color: rgba(245, 158, 11, 0.05);
        background-color: transparent;
      }

      50% {
        border-color: rgba(245, 158, 11, 0.4);
        background-color: rgba(245, 158, 11, 0.03);
      }
    }

    .animate-pulse-glow {
      animation: pulse-glow 2s infinite ease-in-out;
    }

    .animate-pulse-ring {
      animation: pulse-ring 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
    }

    .animate-container-flash {
      animation: container-flash 2.5s infinite ease-in-out;
    }

    .animate-slide-up {
